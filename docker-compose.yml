version: "3.9"

services:
  # ─── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: finverse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finverse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finverse_secret}
      POSTGRES_DB: ${POSTGRES_DB:-finverse_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finverse}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: finverse_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ───────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: finverse_server
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-finverse}:${POSTGRES_PASSWORD:-finverse_secret}@postgres:5432/${POSTGRES_DB:-finverse_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/node_modules

  # ─── AI Services ───────────────────────────────────────────────
  ai-services:
    build:
      context: ./ai-services
      dockerfile: Dockerfile
    container_name: finverse_ai
    restart: unless-stopped
    env_file: ./ai-services/.env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - ./ai-services:/app

  # ─── Frontend ──────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: finverse_client
    restart: unless-stopped
    env_file: ./client/.env
    ports:
      - "3000:3000"
    depends_on:
      - server
    environment:
      VITE_API_URL: http://server:5000/api/v1
      VITE_AI_URL: http://ai-services:8000/api/v1

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: finverse_network
